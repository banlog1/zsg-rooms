name: Release Mod

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release JAR
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x gradlew
          ./gradlew clean test build -Pmod_version="$VERSION"
          JAR="build/libs/zsg-rooms-$VERSION.jar"
          sha256sum "$JAR" > "$JAR.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          JAR="build/libs/zsg-rooms-$VERSION.jar"
          gh release create "$GITHUB_REF_NAME" "$JAR" "$JAR.sha256" --generate-notes --title "ZSG Rooms $VERSION"
